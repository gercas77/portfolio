name: CI

on:
    pull_request:
        branches: [main]

jobs:
    lint:
        name: Lint & Typecheck
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4
              with:
                  version: 9.15.0

            - uses: actions/setup-node@v4
              with:
                  node-version: 22.14.0
                  cache: "pnpm"

            - run: pnpm install --frozen-lockfile
            - run: pnpm turbo lint
            - run: pnpm turbo build
